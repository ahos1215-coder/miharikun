name: Process Pending Queue

on:
  schedule:
    # JST 12:00 = UTC 03:00
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: '処理するソース（空=全ソース）'
        type: choice
        options:
          - ''
          - nk
          - mlit
        default: ''
      limit:
        description: '1回の処理件数上限'
        type: string
        default: '20'
      dry_run:
        description: 'Dry-run（実際の処理をスキップ）'
        type: boolean
        default: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Process pending queue
        run: |
          ARGS=""

          if [ -n "${{ inputs.source }}" ]; then
            ARGS="$ARGS --source ${{ inputs.source }}"
          fi

          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          cd scripts
          python process_queue.py $ARGS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL || 'gemini-2.0-flash' }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}

      - name: Send LINE notification on failure
        if: failure()
        run: |
          MESSAGE="%0A[MIHARIKUN] Process Queue が失敗しました%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -d "message=${MESSAGE}" || true
          fi
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
