name: NK Reset + Re-collect (100 entries)
on:
  workflow_dispatch:
    inputs:
      max_entries:
        description: '取得件数'
        type: string
        default: '100'

jobs:
  nk-recollect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: NK データ削除
        run: python scripts/reset_mlit_data.py --nk-only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: NK スクレイパー実行 (100件)
        run: python scripts/scrape_nk.py --max-entries ${{ github.event.inputs.max_entries }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
