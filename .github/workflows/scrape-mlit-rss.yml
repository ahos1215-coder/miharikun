name: MLIT RSS Daily

on:
  schedule:
    # JST 08:00 = UTC 23:00 (前日)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（PDF/Gemini/DB をスキップ）'
        type: boolean
        default: false
      limit:
        description: '処理件数上限'
        type: string
        default: '20'
      since:
        description: '指定日以降のみ処理（YYYY-MM-DD）'
        type: string
        default: ''

jobs:
  scrape-mlit-rss:
    name: MLIT RSS スクレイピング
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      GEMINI_FALLBACK_MODEL: ${{ secrets.GEMINI_FALLBACK_MODEL }}
      LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      MLIT_RSS_URLS: ${{ secrets.MLIT_RSS_URLS }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: MLIT RSS スクレイパーを実行
        id: scrape
        run: |
          cd scripts

          # 引数を組み立て
          ARGS=""

          # dry_run フラグ
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # limit
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi

          # since
          SINCE="${{ github.event.inputs.since }}"
          if [ -n "$SINCE" ]; then
            ARGS="$ARGS --since $SINCE"
          fi

          python scrape_mlit_rss.py $ARGS

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlit-rss-logs-${{ github.run_number }}
          path: |
            scripts/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 失敗時に LINE 通知
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -F "message=[MLIT RSS] GitHub Actions ワークフローが失敗しました。Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
