name: MLIT Weekly Crawl

on:
  schedule:
    # JST 日曜 06:00 = UTC 土曜 21:00
    - cron: '0 21 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（DB 書き込みをスキップ）'
        type: boolean
        default: false

jobs:
  crawl-mlit:
    name: MLIT シードURL方式クロール
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: MLIT クロールを実行
        id: crawl
        run: |
          cd scripts

          ARGS=""

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python scrape_mlit_crawl.py $ARGS --verbose

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlit-crawl-logs-${{ github.run_number }}
          path: |
            scripts/*.log
          retention-days: 14
          if-no-files-found: ignore

      - name: 失敗時に LINE 通知
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -F "message=[MLIT クロール] GitHub Actions ワークフローが失敗しました。Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
