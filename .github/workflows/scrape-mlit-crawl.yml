name: MLIT Weekly Crawl

on:
  schedule:
    # JST 日曜 06:00 = UTC 土曜 21:00
    - cron: '0 21 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（DB 書き込みをスキップ）'
        type: boolean
        default: false
      max_pages:
        description: 'クロール最大ページ数'
        type: string
        default: '100'
      depth:
        description: 'クロール深さ（1-5）'
        type: string
        default: '3'

jobs:
  crawl-mlit:
    name: MLIT ウェブクロール
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      MLIT_CRAWL_DEPTH: ${{ github.event.inputs.depth || '3' }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: MLIT クロールを実行
        id: crawl
        run: |
          cd scripts

          # 引数を組み立て
          ARGS=""

          # dry_run フラグ
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # max_pages
          MAX_PAGES="${{ github.event.inputs.max_pages }}"
          if [ -n "$MAX_PAGES" ]; then
            ARGS="$ARGS --max-pages $MAX_PAGES"
          fi

          # depth
          DEPTH="${{ github.event.inputs.depth }}"
          if [ -n "$DEPTH" ]; then
            ARGS="$ARGS --depth $DEPTH"
          fi

          python scrape_mlit_crawl.py $ARGS

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlit-crawl-logs-${{ github.run_number }}
          path: |
            scripts/*.log
          retention-days: 14
          if-no-files-found: ignore

      - name: 失敗時に LINE 通知
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -F "message=[MLIT クロール] GitHub Actions ワークフローが失敗しました。Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
