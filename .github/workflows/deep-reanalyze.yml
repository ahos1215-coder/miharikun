name: Deep Reanalyze (Fact-based)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        type: boolean
        default: false
      limit:
        description: '処理件数制限'
        type: string
        default: ''

jobs:
  reanalyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dotenv PyMuPDF
      - run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          python scripts/deep_reanalyze.py $ARGS > distilled_report.md
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: distilled-report-v2
          path: distilled_report.md
          retention-days: 30
