name: NK Weekly Scraper

on:
  # JST 日曜 07:00 = UTC 土曜 22:00 に週次実行
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run（PDF ダウンロード・Gemini 分類をスキップ）'
        type: boolean
        default: false
      tec_number:
        description: '特定の TEC 番号のみ処理（例: 1373）'
        type: string
        default: ''
      all_pages:
        description: '全ページ取得（初回全量投入時）'
        type: boolean
        default: false
      limit:
        description: '1回の実行で処理する最大件数'
        type: string
        default: '10'

jobs:
  scrape:
    # 2026-03-30 検証: GHA ubuntu-latest から ClassNK に直接アクセス可能を確認
    # 以前の 403 ブロックは UA 問題が原因だった（ca4e0f1 で解決済み）
    # Self-hosted Runner は不要。IP ブロックが再発した場合のみ self-hosted に戻すこと
    runs-on: ubuntu-latest
    # Environment Protection Rules で外部 PR による無承認実行を防ぐ
    environment: production
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set Python command
        run: echo "PYTHON_CMD=python" >> "$GITHUB_ENV"

      - name: Install dependencies
        shell: bash
        run: $PYTHON_CMD -m pip install --upgrade pip && $PYTHON_CMD -m pip install -r scripts/requirements.txt

      - name: Run NK scraper
        id: scrape
        shell: bash
        run: |
          ARGS="--json-output"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ -n "${{ inputs.tec_number }}" ]; then
            ARGS="$ARGS --tec ${{ inputs.tec_number }}"
          fi

          if [ "${{ inputs.all_pages }}" = "true" ]; then
            ARGS="$ARGS --all-pages"
          fi

          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi

          ARGS="$ARGS --max-entries 100"

          # スクリプトは scripts/ 配下で実行（utils/ の import パスを解決するため）
          cd scripts
          $PYTHON_CMD scrape_nk.py $ARGS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL || 'gemini-2.0-flash' }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}

      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nk-scrape-${{ github.run_number }}
          path: scripts/output/
          retention-days: 30
          if-no-files-found: warn

      - name: Send LINE notification on failure
        if: failure()
        shell: bash
        run: |
          MESSAGE="%0A[MIHARIKUN] NK Daily Scraper が失敗しました%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0ATime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -d "message=${MESSAGE}" || true
          fi
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
