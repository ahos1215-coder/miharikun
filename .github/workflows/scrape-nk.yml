name: NK Daily Scraper

on:
  # JST 07:00 = UTC 22:00 に毎日実行
  # self-hosted runner (Windows 11 ローカル PC) で動作するため classnk.or.jp にアクセス可能
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run（PDF ダウンロード・Gemini 分類をスキップ）'
        type: boolean
        default: false
      tec_number:
        description: '特定の TEC 番号のみ処理（例: 1373）'
        type: string
        default: ''
      all_pages:
        description: '全ページ取得（初回全量投入時）'
        type: boolean
        default: false
      limit:
        description: '1回の実行で処理する最大件数'
        type: string
        default: '10'

jobs:
  scrape:
    # self-hosted runner (Windows 11 ローカル PC) を使用
    # ClassNK は GHA の IP をブロックするためローカル PC から実行する
    runs-on: [self-hosted, Windows, nk-runner]
    # Environment Protection Rules で外部 PR による無承認実行を防ぐ
    environment: production
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (with system fallback)
        # self-hosted では actions/setup-python が動作しない場合があるため
        # システムの Python を優先的に利用し、なければ setup-python にフォールバックする
        id: setup-python
        shell: bash
        run: |
          # Python 3.11 を優先して探す（Windows: py ランチャー → python3.11 → python3 → python）
          if py -3.11 --version 2>/dev/null; then
            echo "PYTHON_CMD=py -3.11" >> "$GITHUB_ENV"
            echo "Python 3.11 found via py launcher"
          elif python3.11 --version 2>/dev/null; then
            echo "PYTHON_CMD=python3.11" >> "$GITHUB_ENV"
            echo "Python 3.11 found as python3.11"
          elif python3 --version 2>/dev/null; then
            echo "PYTHON_CMD=python3" >> "$GITHUB_ENV"
            echo "Python found as python3"
          else
            echo "PYTHON_CMD=python" >> "$GITHUB_ENV"
            echo "Falling back to python"
          fi

      - name: Install dependencies
        shell: bash
        run: $PYTHON_CMD -m pip install --upgrade pip && $PYTHON_CMD -m pip install -r scripts/requirements.txt

      - name: Run NK scraper
        id: scrape
        shell: bash
        run: |
          ARGS="--json-output"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ -n "${{ inputs.tec_number }}" ]; then
            ARGS="$ARGS --tec ${{ inputs.tec_number }}"
          fi

          if [ "${{ inputs.all_pages }}" = "true" ]; then
            ARGS="$ARGS --all-pages"
          fi

          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi

          # スクリプトは scripts/ 配下で実行（utils/ の import パスを解決するため）
          cd scripts
          $PYTHON_CMD scrape_nk.py $ARGS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL || 'gemini-2.0-flash' }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}

      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nk-scrape-${{ github.run_number }}
          path: scripts/output/
          retention-days: 30
          if-no-files-found: warn

      - name: Send LINE notification on failure
        if: failure()
        shell: bash
        run: |
          MESSAGE="%0A[MIHARIKUN] NK Daily Scraper が失敗しました%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0ATime: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -d "message=${MESSAGE}" || true
          fi
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
