name: Export MLIT Articles
on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/export_mlit_articles.py > mlit_articles.md
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXPORT_SOURCE: ''
      - uses: actions/upload-artifact@v4
        with:
          name: mlit-articles
          path: mlit_articles.md
          retention-days: 7
